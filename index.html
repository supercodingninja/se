<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Audio to English Text</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        button {
            font-size: 18px;
            padding: 10px 20px;
            margin: 10px;
            cursor: pointer;
            border-radius: 50px;
            border: none;
        }
        #recordBtn { background-color: #ff4d4d; color: white; }
        #stopBtn { background-color: #333; color: white; }
        #stopBtn:disabled { background-color: #ccc; }
        #output {
            margin-top: 30px;
            padding: 20px;
            background: #f4f4f4;
            border-radius: 8px;
            min-height: 100px;
            text-align: left;
        }
    </style>
</head>
<body>

    <h1>Spanish to English Audio Translator</h1>
    <p>Click record and speak Spanish. The app will translate it to English text.</p>

    <button id="recordBtn">🎤 Start Recording</button>
    <button id="stopBtn" disabled>⏹️ Stop</button>

    <h3>Translated English Text:</h3>
    <div id="output">Your translation will appear here...</div>

    <script>
        // Replace with your actual Google Cloud API Key
        const API_KEY = 'YOUR_GOOGLE_CLOUD_API_KEY'; 
        
        let mediaRecorder;
        let audioChunks = [];

        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const outputDiv = document.getElementById('output');

        recordBtn.addEventListener('click', async () => {
            audioChunks = [];
            outputDiv.innerText = "Listening...";
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    outputDiv.innerText = "Translating...";
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const base64Audio = await blobToBase64(audioBlob);
                    sendToTranslationAPI(base64Audio);
                };

                mediaRecorder.start();
                recordBtn.disabled = true;
                stopBtn.disabled = false;
            } catch (err) {
                outputDiv.innerText = "Error accessing microphone: " + err.message;
            }
        });

        stopBtn.addEventListener('click', () => {
            mediaRecorder.stop();
            recordBtn.disabled = false;
            stopBtn.disabled = true;
        });

        // Helper function to convert audio blob to Base64 for the API
        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64String = reader.result.split(',')[1];
                    resolve(base64String);
                };
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        // Sends the audio to Google Cloud Speech-to-Text with translation config
        async function sendToTranslationAPI(base64Audio) {
            const url = `https://googleapis.com{API_KEY}`;
            
            const requestBody = {
                config: {
                    encoding: "WEBM_OPUS",
                    sampleRateHertz: 48000,
                    languageCode: "es-ES", // Detects Spanish audio
                    alternativeLanguageCodes: ["en-US"] // Forces translation output context if supported, or use modern Cloud Translation API wrapper
                },
                audio: {
                    content: base64Audio
                }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify(requestBody),
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.results && data.results[0]) {
                    const spanishText = data.results[0].alternatives[0].transcript;
                    outputDiv.innerText = "Detected Spanish: " + spanishText + "\n\nTranslating text...";
                    
                    // Call text translation to finish the job
                    translateText(spanishText);
                } else {
                    outputDiv.innerText = "Could not understand the audio.";
                }
            } catch (error) {
                outputDiv.innerText = "API Error: " + error.message;
            }
        }

        // Translates the transcribed Spanish text into English
        async function translateText(text) {
            const url = `https://googleapis.com{API_KEY}`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    body: JSON.stringify({
                        q: text,
                        target: 'en',
                        source: 'es'
                    }),
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                const englishTranslation = data.data.translations[0].translatedText;
                outputDiv.innerText = englishTranslation;
            } catch (error) {
                outputDiv.innerText = "Translation Error: " + error.message;
            }
        }
    </script>
</body>
</html>
