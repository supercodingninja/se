<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Spanish to English Translator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f9f9fb;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        button {
            font-size: 16px;
            font-weight: bold;
            padding: 12px 28px;
            margin: 10px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            transition: background 0.2s;
        }
        #startBtn { background-color: #007bff; color: white; }
        #startBtn:hover { background-color: #0056b3; }
        #stopBtn { background-color: #dc3545; color: white; }
        #stopBtn:hover { background-color: #bd2130; }
        button:disabled { background-color: #cccccc !important; cursor: not-allowed; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            text-align: left;
        }
        .box {
            padding: 15px;
            background: #f1f3f5;
            border-radius: 8px;
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .status {
            font-weight: bold;
            color: #28a745;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ Real-Time Spanish ➔ English Translator</h2>
    <p>Click start and speak Spanish continuously. The text will translate instantly.</p>

    <button id="startBtn">▶️ Start Live Translation</button>
    <button id="stopBtn" disabled>⏸️ Stop</button>
    
    <div id="statusText" class="status"></div>

    <div class="grid">
        <div>
            <h3>Live Spanish (Speech)</h3>
            <div id="spanishOutput" class="box">Waiting for speech...</div>
        </div>
        <div>
            <h3>Live English (Translation)</h3>
            <div id="englishOutput" class="box">Translation will appear here...</div>
        </div>
    </div>
</div>

<script>
    // ⚠️ REPLACE WITH YOUR GOOGLE CLOUD TRANSLATION API KEY
    const GOOGLE_API_KEY = 'YOUR_GOOGLE_CLOUD_API_KEY';

    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const spanishOutput = document.getElementById('spanishOutput');
    const englishOutput = document.getElementById('englishOutput');
    const statusText = document.getElementById('statusText');

    // Initialize the browser's native Speech Recognition
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        alert("Your browser does not support Web Speech API. Please use Google Chrome or Microsoft Edge.");
    }

    const recognition = new SpeechRecognition();
    
    // Crucial configurations for Real-Time streaming:
    recognition.continuous = true;       // Keeps listening even if the speaker pauses
    recognition.interimResults = true;   // Provides text immediately before the sentence finishes
    recognition.lang = 'es-ES';          // Sets input language to Spanish

    let finalSpanishTranscript = '';

    startBtn.addEventListener('click', () => {
        finalSpanishTranscript = '';
        spanishOutput.innerText = '';
        englishOutput.innerText = '';
        statusText.innerText = "🎤 Microphone active. Speak Spanish now...";
        
        recognition.start();
        startBtn.disabled = true;
        stopBtn.disabled = false;
    });

    stopBtn.addEventListener('click', () => {
        recognition.stop();
        statusText.innerText = "🛑 Stopped listening.";
        startBtn.disabled = false;
        stopBtn.disabled = true;
    });

    // Triggers continuously as the user speaks
    recognition.onresult = async (event) => {
        let interimTranscript = '';
        
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                finalSpanishTranscript += event.results[i][0].transcript + ' ';
            } else {
                interimTranscript += event.results[i][0].transcript;
            }
        }

        // Combine permanent text with real-time guessing text
        const currentSpanishText = finalSpanishTranscript + interimTranscript;
        
        // Update the Spanish UI pane instantly
        spanishOutput.innerText = currentSpanishText;

        // Only send to translation API if there is actual text to process
        if (currentSpanishText.trim().length > 0) {
            streamTranslateToEnglish(currentSpanishText);
        }
    };

    recognition.onerror = (event) => {
        statusText.style.color = '#dc3545';
        statusText.innerText = "Error occurred: " + event.error;
    };

    recognition.onend = () => {
        // Automatically restart if the button wasn't toggled off manually
        if (startBtn.disabled) {
            recognition.start();
        }
    };

    // Makes a rapid POST request to Google Translate API
    async function streamTranslateToEnglish(text) {
        const url = `https://googleapis.com{GOOGLE_API_KEY}`;
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                body: JSON.stringify({
                    q: text,
                    target: 'en',
                    source: 'es'
                }),
                headers: { 'Content-Type': 'application/json' }
            });
            
            const data = await response.json();
            
            if (data.data && data.data.translations) {
                const translatedText = data.data.translations[0].translatedText;
                // Update the English UI pane instantly
                englishOutput.innerText = translatedText;
            }
        } catch (error) {
            console.error("Translation stream error:", error);
        }
    }
</script>

</body>
</html>
